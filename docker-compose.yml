services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: qfb-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qfb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD missing — copy .env.example to .env and set it}
      POSTGRES_DB: ${POSTGRES_DB:-quantflowbots}
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5433:5432"
    volumes:
      - qfb_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qfb} -d ${POSTGRES_DB:-quantflowbots}"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: qfb-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - qfb_redisdata:/data

volumes:
  qfb_pgdata:
  qfb_redisdata:
